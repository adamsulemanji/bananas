version: 0.0
os: linux
files:
  - source: /
    destination: /home/ec2-user/app
    overwrite: true
permissions:
  - object: /home/ec2-user/app
    owner: ec2-user
    group: ec2-user
    mode: "755"
    type:
      - directory
      - file
hooks:
  BeforeInstall:
    - location: scripts/stop_server.sh
      timeout: 60
      runas: root
  AfterInstall:
    - location: scripts/install_deps.sh
      timeout: 300
      runas: root
  ApplicationStart:
    - location: scripts/start_server.sh
      timeout: 60
      runas: ec2-user
  ValidateService:
    - location: scripts/validate_service.sh
      timeout: 60
      runas: ec2-user
